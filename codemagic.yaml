# Codemagic configuration for React/Vite Web App
# To build for native iOS, you would normally add Capacitor to this project.

workflows:
  ios-native-build:
    name: Aura Glider iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
      vars:
        # You will need to add these in Codemagic UI:
        # APP_STORE_CONNECT_KEY_IDENTIFIER: YOUR_KEY_ID
        # APP_STORE_CONNECT_ISSUER_ID: YOUR_ISSUER_ID
        # APP_STORE_CONNECT_PRIVATE_KEY: YOUR_PRIVATE_KEY
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web application
        script: npm run build
      - name: Capacitor Sync
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Build iOS IPA
        script: |
          # Use codemagic-cli to fetch signing files (if configured)
          # app-store-connect fetch-signing-files "com.auraglider.app" --type IOS_APP_STORE
          
          # Actual build command
          xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/App.xcodeproj

  web-build:
    name: Web Application Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web application
        script: npm run build
    artifacts:
      - dist/**/*

  # For iOS (Requires Capacitor setup)
