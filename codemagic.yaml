# Codemagic configuration for React/Vite Web App
# To build for native iOS, you would normally add Capacitor to this project.

workflows:
  ios-native-build:
    name: Aura Glider iOS Build (IPA)
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.auraglider.app"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web application
        script: npm run build
      - name: Capacitor Sync
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Set up signing and build IPA
        script: |
          # 1. Fetch signing files (Requires APP_STORE_CONNECT_* vars in Codemagic UI)
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE
          
          # 2. Install certificates into the keychain
          keychain add-certificates
          
          # 3. Configure Xcode to use the fetched profiles
          xcode-project use-profiles
          
          # 4. Build the IPA
          xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

  android-native-build:
    name: Aura Glider Android Build (APK)
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web application
        script: npm run build
      - name: Capacitor Sync
        script: |
          npx cap add android || true
          npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

  web-build:
    name: Web Application Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web application
        script: npm run build
    artifacts:
      - dist/**/*

