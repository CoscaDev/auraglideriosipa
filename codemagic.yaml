# Codemagic configuration for React/Vite Web App
# To build for native iOS, you would normally add Capacitor to this project.

workflows:
  android-debug-apk:
    name: Aura Glider Android APK (Debug/Fast)
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web application
        script: npm run build
      - name: Capacitor Sync
        script: |
          npx cap add android || true
          npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

  ios-ipa-build:
    name: Aura Glider iOS IPA (Requires Apple Keys)
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.auraglider.app"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web application
        script: npm run build
      - name: Capacitor Sync
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Set up signing and build IPA
        script: |
          if [ -z "$APP_STORE_CONNECT_ISSUER_ID" ]; then
            echo "❌ ERROR: APP_STORE_CONNECT_ISSUER_ID is not set in Codemagic Environment Variables."
            echo "Go to Codemagic UI -> Environment Variables to add your Apple API keys."
            exit 1
          fi
          
          # Fetch and install certificates
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE
          keychain add-certificates
          xcode-project use-profiles
          
          # Build IPA
          xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa

  web-build:
    name: Web Application Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web application
        script: npm run build
    artifacts:
      - dist/**/*

